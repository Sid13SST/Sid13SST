<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="100%" style="background:#03050c; font-family:'Outfit', sans-serif;">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Outfit:wght@300;400;600;800&amp;display=swap');
    
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 36px;
      fill: url(#text-grad);
      letter-spacing: 1px;
    }
    
    .subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #8E9AAF;
      letter-spacing: 2px;
    }
    
    .tag-bg {
      fill: #0B1021;
      stroke: #1E293B;
      stroke-width: 1px;
      rx: 4px;
    }
    
    .tag-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #00F0FF;
    }
    
    .system-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #475569;
    }

    .pulse-dot {
      fill: #00FF66;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* Clean mathematical rotation for the right visual */
    .rotate-slow {
      transform-origin: 680px 130px;
      animation: rotate-clockwise 30s linear infinite;
    }
    
    .rotate-fast {
      transform-origin: 680px 130px;
      animation: rotate-counter 20s linear infinite;
    }

    @keyframes rotate-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes rotate-counter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
  </style>

  <defs>
    <!-- Cyan to Blue high-end gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0D1527" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#03050c" stop-opacity="1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="260" fill="#03050c" />
  <rect width="850" height="260" fill="url(#bg-glow)" />

  <!-- Subtle Cyber Grid Lines (low opacity to prevent clutter) -->
  <line x1="50" y1="0" x2="50" y2="260" stroke="#121826" stroke-width="0.5" />
  <line x1="200" y1="0" x2="200" y2="260" stroke="#121826" stroke-width="0.5" />
  <line x1="350" y1="0" x2="350" y2="260" stroke="#121826" stroke-width="0.5" />
  <line x1="500" y1="0" x2="500" y2="260" stroke="#121826" stroke-width="0.5" />
  
  <line x1="0" y1="50" x2="850" y2="50" stroke="#121826" stroke-width="0.5" />
  <line x1="0" y1="130" x2="850" y2="130" stroke="#121826" stroke-width="0.5" />
  <line x1="0" y1="210" x2="850" y2="210" stroke="#121826" stroke-width="0.5" />

  <!-- Outer sleek border -->
  <rect x="15" y="15" width="820" height="230" fill="none" stroke="#1E293B" stroke-width="1" rx="8" />

  <!-- Top Telemetry Bar -->
  <g transform="translate(40, 38)">
    <circle cx="0" cy="-4" r="3.5" class="pulse-dot" />
    <text x="12" y="0" class="system-status">SYS_STATUS: ACTIVE // LOC: BENGALURU, IN</text>
    <text x="770" y="0" class="system-status" text-anchor="end">SYS_TYPE: FULL_STACK_NODE</text>
  </g>

  <!-- Left Side: Profile Information -->
  <g transform="translate(40, 105)">
    <!-- Title -->
    <text x="0" y="0" class="title">SIDDHANT PRASAD</text>
    
    <!-- Subtitle -->
    <text x="0" y="32" class="subtitle">AI INTEGRATION &amp; BACKEND SYSTEMS</text>
  </g>

  <!-- Tech Badges/Pills Row -->
  <g transform="translate(40, 180)">
    <!-- Badge 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="105" height="24" class="tag-bg" />
      <text x="52.5" y="15" class="tag-text" text-anchor="middle">AI_PIPELINES</text>
    </g>
    <!-- Badge 2 -->
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="130" height="24" class="tag-bg" />
      <text x="65" y="15" class="tag-text" text-anchor="middle" fill="#3B82F6">NEURAL_GATEWAY</text>
    </g>
    <!-- Badge 3 -->
    <g transform="translate(255, 0)">
      <rect x="0" y="0" width="125" height="24" class="tag-bg" />
      <text x="62.5" y="15" class="tag-text" text-anchor="middle">EDGE_RUNTIMES</text>
    </g>
  </g>

  <!-- Right Side: Clean Mathematical Geometric Visual -->
  <g class="rotate-slow">
    <!-- Clean concentric rings -->
    <circle cx="680" cy="130" r="65" fill="none" stroke="#1E293B" stroke-width="1" />
    <circle cx="680" cy="130" r="50" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="12 8" stroke-opacity="0.7" />
  </g>
  
  <g class="rotate-fast">
    <circle cx="680" cy="130" r="35" fill="none" stroke="#00F0FF" stroke-width="1.2" stroke-dasharray="40 10 5 10" stroke-opacity="0.8" />
  </g>
  
  <!-- Core Point -->
  <circle cx="680" cy="130" r="4" fill="#00F0FF" />
  <circle cx="680" cy="130" r="10" fill="none" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.3" />
</svg>
