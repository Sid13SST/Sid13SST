<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%" height="100%" style="background:#060A13; font-family:'Outfit', sans-serif;">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&amp;family=Outfit:wght@300;400;600&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 22px;
      fill: #00F0FF;
      filter: drop-shadow(0px 0px 4px rgba(0, 240, 255, 0.5));
    }
    
    .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #5F7594;
    }
    
    .value {
      font-weight: 600;
      font-size: 13px;
      fill: #E2E8F0;
    }
    
    .glow-box {
      stroke: #1E293B;
      stroke-width: 1px;
      fill: #0B1120;
      rx: 6px;
    }

    .neon-border {
      stroke: #00F0FF;
      stroke-width: 1px;
      fill: #0B1120;
      rx: 6px;
      filter: drop-shadow(0px 0px 3px rgba(0, 240, 255, 0.4));
    }
    
    .pulse {
      animation: pulse-glow 2s infinite alternate;
    }
    
    @keyframes pulse-glow {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }
    
    .beam {
      stroke: #BD00FF;
      stroke-width: 1.5px;
      fill: none;
      stroke-dasharray: 6;
      animation: dash 4s linear infinite;
    }
    
    @keyframes dash {
      to {
        stroke-dashoffset: -24;
      }
    }
  </style>

  <rect width="850" height="200" fill="#060A13" rx="8" stroke="#1E293B" stroke-width="1" />
  
  <!-- Grid accents -->
  <line x1="20" y1="0" x2="20" y2="200" stroke="#101726" stroke-width="1" />
  <line x1="830" y1="0" x2="830" y2="200" stroke="#101726" stroke-width="1" />
  
  <!-- Left Side: Product Branding -->
  <g transform="translate(40, 40)">
    <text x="0" y="10" class="title" fill="#BD00FF" filter="drop-shadow(0px 0px 4px rgba(189, 0, 255, 0.5))">CLARIBOT</text>
    <text x="0" y="32" font-family="'Share Tech Mono', monospace" font-size="12" fill="#00F0FF" font-weight="bold">AI CONVERSATIONAL AGENT MATRIX</text>
    
    <text x="0" y="65" class="value" font-size="14" fill="#94A3B8">Orchestrating autonomous AI agents with</text>
    <text x="0" y="85" class="value" font-size="14" fill="#94A3B8">semantic memory and dynamic tool execution.</text>
    
    <!-- Status tag -->
    <rect x="0" y="115" width="100" height="24" rx="12" fill="#131127" stroke="#00F0FF" stroke-width="1" />
    <circle cx="15" cy="127" r="4" fill="#00F0FF" class="pulse" />
    <text x="27" y="131" font-family="'Share Tech Mono', monospace" font-size="10" fill="#E2E8F0">ACTIVE DEPLOY</text>
  </g>

  <!-- Right Side: Interactive Flow Diagram -->
  <!-- Block 1: User Request -->
  <g transform="translate(380, 50)">
    <rect x="0" y="0" width="100" height="60" class="glow-box" />
    <text x="50" y="22" text-anchor="middle" class="label">DIALOGUE IN</text>
    <text x="50" y="42" text-anchor="middle" class="value" fill="#E2E8F0">Natural Lang</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 480 80 L 520 80" class="beam" />
  
  <!-- Block 2: Claribot Engine -->
  <g transform="translate(520, 40)">
    <rect x="0" y="0" width="130" height="80" class="neon-border" />
    <text x="65" y="25" text-anchor="middle" class="label" fill="#00F0FF">AGENT MANAGER</text>
    <text x="65" y="48" text-anchor="middle" class="value" fill="#BD00FF" font-family="'Orbitron', sans-serif">CLARIBOT</text>
    <text x="65" y="65" text-anchor="middle" class="label" font-size="9">RAG &amp; Tool Routing</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 650 80 L 690 80" class="beam" />

  <!-- Block 3: Contextual Action -->
  <g transform="translate(690, 50)">
    <rect x="0" y="0" width="110" height="60" class="glow-box" />
    <text x="55" y="22" text-anchor="middle" class="label">EXECUTION</text>
    <text x="55" y="42" text-anchor="middle" class="value" fill="#BD00FF">API Call / Tool</text>
  </g>

  <!-- Flow labels at bottom -->
  <text x="595" y="150" text-anchor="middle" class="label" fill="#475569">Autonomous Contextual Action Loop</text>
</svg>
